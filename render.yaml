services:
  # Backend API (FastAPI)
  - type: web
    name: stock-analyzer-api
    env: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromContext: DATABASE_URL
      - key: FINNHUB_API_KEY
        fromContext: FINNHUB_API_KEY
      - key: REDIS_URL
        fromService:
          name: stock-analyzer-cache
          type: redis
          property: connectionString
      - key: PORT
        value: 8000


services:
  # ─────────────────────────────────────────
  # Backend API (FastAPI)
  # ─────────────────────────────────────────
  - type: web
    name: stock-analyzer-api
    env: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromContext: DATABASE_URL # 將從環境變數面板抓取
      - key: FINNHUB_API_KEY
        fromContext: FINNHUB_API_KEY
      - key: REDIS_URL
        fromContext: REDIS_URL
      - key: PORT
        value: 8000

  # ────────────────────────────────────────
  # Frontend Static Site (Vite / React)
  # ─────────────────────────────────────────
  -    type: static_site
    name: stock-analyzer-web
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: stock-analyzer-api
          type: web
          property: host
        generateValue: true # 自動動態指向後端網址
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

services:
  - type: web
    name: stock-analyzer-api
    env: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: FINNHUB_API_KEY
        sync: false          # 部署時在 Render Dashboard 手動填入
      - key: EXTRA_ALLOWED_ORIGIN
        sync: false          # 填入你的 Vercel 網址，例如 https://stock-analyzer.vercel.app

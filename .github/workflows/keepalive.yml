name: Keepalive — Ping Railway Backend

on:
  schedule:
    - cron: '*/10 * * * *'   # 每 10 分鐘執行一次
  workflow_dispatch:           # 允許手動觸發

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://backend-production-2879.up.railway.app/health)
          echo "Health check HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned $STATUS"
          fi
